# Netlify: monorepo — build only the React app in frontend/
# Dashboard: Site configuration → Environment variables (required for production builds)
#
#   REACT_APP_API_URL     = https://YOUR-SERVICE.onrender.com/api   (no slash after "api")
#   REACT_APP_GOOGLE_CLIENT_ID = same value as backend GOOGLE_CLIENT_ID (or Google button stays hidden)

[build]
  base = "frontend"
  command = "npm run build"
  publish = "build"

[build.environment]
  NODE_VERSION = "18"

# SPA fallback is also in frontend/public/_redirects (copied into build/)
